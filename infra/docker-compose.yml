version: '3.8'

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    env_file:
      - ./env/api.env
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: optionlens
      POSTGRES_USER: optionlens
      POSTGRES_PASSWORD: optionlens_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

volumes:
  postgres_data:
